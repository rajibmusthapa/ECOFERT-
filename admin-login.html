<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Login - ESCOFERT</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#2D6A2B,#4CAF50);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}.login-container{max-width:400px;width:100%;}.login-card{background:white;border-radius:30px;padding:40px 30px;box-shadow:0 25px 50px rgba(0,0,0,0.3);text-align:center;}.logo{width:80px;height:80px;border-radius:20px;margin-bottom:20px;object-fit:cover;}.login-card h1{color:#2D6A2B;font-size:24px;margin-bottom:8px;}.login-card p{color:#666;font-size:14px;margin-bottom:30px;}.input-group{margin-bottom:20px;text-align:left;}.input-group label{display:block;margin-bottom:8px;font-weight:600;color:#333;font-size:14px;}.input-group input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;}.input-group input:focus{outline:none;border-color:#4CAF50;}.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#2D6A2B,#4CAF50);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;}.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(76,175,80,0.3);}.error-msg{background:#ff4444;color:white;padding:12px;border-radius:10px;margin-bottom:20px;font-size:14px;display:none;}.back-link{display:block;margin-top:20px;color:#666;text-decoration:none;font-size:14px;}.demo-info{background:#f5f5f5;padding:15px;border-radius:12px;margin-top:20px;font-size:12px;color:#666;}.captcha-container{background:#f0f0f0;padding:10px;border-radius:8px;margin:15px 0;text-align:center;}
</style></head>
<body><div class="login-container"><div class="login-card"><img src="logo.jpg" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/80'"><h1>Admin Panel</h1><p>🔒 Masuk ke sistem manajemen</p><div id="errorMsg" class="error-msg"></div><div class="input-group"><label><i class="fas fa-user-shield"></i> Username</label><input type="text" id="username" placeholder="Masukkan username" autocomplete="off"></div><div class="input-group"><label><i class="fas fa-lock"></i> Password</label><input type="password" id="password" placeholder="Masukkan password"></div><div class="captcha-container"><div style="display:flex;align-items:center;justify-content:center;gap:10px;"><span id="captchaCode" style="background:#2D6A2B;color:white;padding:8px 15px;border-radius:8px;font-weight:bold;letter-spacing:3px;"></span><button type="button" onclick="refreshCaptcha()" style="background:none;border:none;cursor:pointer;"><i class="fas fa-sync-alt" style="color:#2D6A2B;"></i></button></div><input type="text" id="captchaInput" placeholder="Masukkan kode di atas" style="width:100%;padding:8px;margin-top:8px;border:1px solid #ddd;border-radius:6px;"></div><button class="btn-login" onclick="adminLogin()"><i class="fas fa-sign-in-alt"></i> Login</button><a href="index.html" class="back-link">← Kembali ke Toko</a><div class="demo-info"><strong>🔐 Demo Login:</strong><br>Username: <strong>admin</strong><br>Password: <strong>admin123</strong></div></div></div>
<script>let currentCaptcha='';function generateCaptcha(){const chars='ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';let captcha='';for(let i=0;i<6;i++)captcha+=chars.charAt(Math.floor(Math.random()*chars.length));currentCaptcha=captcha;document.getElementById('captchaCode').textContent=captcha;return captcha;}function refreshCaptcha(){generateCaptcha();document.getElementById('captchaInput').value='';}let loginAttempts=0,lastAttemptTime=0;function adminLogin(){const username=document.getElementById('username').value.trim();const password=document.getElementById('password').value;const captchaInput=document.getElementById('captchaInput').value.trim();const errorMsg=document.getElementById('errorMsg');const now=Date.now();if(loginAttempts>=5&&(now-lastAttemptTime)<900000){errorMsg.style.display='block';errorMsg.innerHTML='<i class="fas fa-clock"></i> Terlalu banyak percobaan. Coba lagi nanti.';setTimeout(()=>errorMsg.style.display='none',5000);return;}if(captchaInput!==currentCaptcha){loginAttempts++;lastAttemptTime=now;errorMsg.style.display='block';errorMsg.innerHTML='<i class="fas fa-exclamation-circle"></i> Kode captcha salah!';refreshCaptcha();setTimeout(()=>errorMsg.style.display='none',3000);return;}if(username==='admin'&&password==='admin123'){loginAttempts=0;const sessionData={logged_in:true,username:username,login_time:now,expiry:now+3600000};sessionStorage.setItem('admin_logged_in',JSON.stringify(sessionData));window.location.href='admin-dashboard.html';}else{loginAttempts++;lastAttemptTime=now;errorMsg.style.display='block';errorMsg.innerHTML='<i class="fas fa-exclamation-circle"></i> Username atau password salah!';refreshCaptcha();setTimeout(()=>errorMsg.style.display='none',3000);}}document.getElementById('password').addEventListener('keypress',function(e){if(e.key==='Enter')adminLogin();});generateCaptcha();const savedSession=sessionStorage.getItem('admin_logged_in');if(savedSession){try{const session=JSON.parse(savedSession);if(session.expiry>Date.now()){window.location.href='admin-dashboard.html';}else{sessionStorage.removeItem('admin_logged_in');}}catch(e){}}</script></body></html>
